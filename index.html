<body>
    <a href="#main-content" class="skip-link" data-i18n="a11y.skip">Skip to content</a>

    <div id="app-loader"><div class="loader-icon">🖤</div></div>

    <button class="theme-toggle" id="themeToggle" aria-label="Toggle theme">
        <span class="theme-icon" id="themeIcon">☀️</span>
    </button>

    <div class="lang-selector">
        <button class="lang-btn" id="langBtn" aria-label="Language">🌐 <span id="currentLang">한국어</span></button>
        <div class="lang-dropdown" id="langDropdown" role="menu">
            <button class="lang-option" data-lang="ko" role="menuitem">🇰🇷 한국어</button>
            <button class="lang-option" data-lang="en" role="menuitem">🇺🇸 English</button>
            <button class="lang-option" data-lang="zh" role="menuitem">🇨🇳 中文</button>
            <button class="lang-option" data-lang="hi" role="menuitem">🇮🇳 हिन्दी</button>
            <button class="lang-option" data-lang="ru" role="menuitem">🇷🇺 Русский</button>
            <button class="lang-option" data-lang="ja" role="menuitem">🇯🇵 日本語</button>
            <button class="lang-option" data-lang="es" role="menuitem">🇪🇸 Español</button>
            <button class="lang-option" data-lang="pt" role="menuitem">🇧🇷 Português</button>
            <button class="lang-option" data-lang="id" role="menuitem">🇮🇩 Indonesia</button>
            <button class="lang-option" data-lang="tr" role="menuitem">🇹🇷 Türkçe</button>
            <button class="lang-option" data-lang="de" role="menuitem">🇩🇪 Deutsch</button>
            <button class="lang-option" data-lang="fr" role="menuitem">🇫🇷 Français</button>
        </div>
    </div>

    <main id="main-content">
        <header>
            <h1 class="app-title" data-i18n="app.title">🖤 Dark Core Test</h1>
            <p class="app-subtitle" data-i18n="app.subtitle">How dark is your personality?</p>
        </header>

        <div class="container">
            <!-- Start Screen -->
            <section id="startScreen" class="card" aria-label="Start">
                <div class="start-content">
                    <div class="dark-orb">
                        <div class="orb-inner">🖤</div>
                    </div>
                    <p class="start-desc" data-i18n="app.description">Answer 12 dark scenarios to measure your Dark Core. Are you Pure Light or an Abyss Dweller?</p>
                    <button class="btn btn-start" id="startBtn" data-i18n="app.start">Reveal My Dark Core</button>
                </div>
            </section>

            <!-- Quiz Screen -->
            <section id="quizScreen" style="display:none;" aria-label="Quiz">
                <div class="progress-bar">
                    <div class="progress-fill" id="progressFill"></div>
                    <span class="progress-text" id="progressText">1 / 12</span>
                </div>
                <div class="dark-counter" id="darkCounter">
                    <span data-i18n="quiz.currentDark">Dark Score:</span>
                    <span class="dark-value" id="darkValue">0</span>
                </div>
                <div class="card question-card" id="questionCard">
                    <div class="scenario-emoji" id="scenarioEmoji">🎯</div>
                    <h2 class="question-text" id="questionText"></h2>
                    <div class="options" id="optionsContainer"></div>
                </div>
            </section>

            <!-- Result Screen -->
            <section id="resultScreen" style="display:none;" aria-label="Result">
                <div class="card result-card">
                    <div class="result-tier-badge" id="tierBadge"></div>
                    <div class="dark-meter-container">
                        <div class="dark-meter" id="darkMeter">
                            <div class="dark-meter-fill" id="darkMeterFill"></div>
                            <div class="dark-meter-glow" id="darkMeterGlow"></div>
                        </div>
                        <div class="dark-score-display" id="darkScoreDisplay">0%</div>
                    </div>
                    <h2 class="result-tier-name" id="tierName"></h2>
                    <p class="result-tier-desc" id="tierDesc"></p>

                    <div class="trait-breakdown" id="traitBreakdown">
                        <h3 data-i18n="result.breakdown">Trait Breakdown</h3>
                        <div class="trait-list" id="traitList"></div>
                    </div>

                    <div class="share-section">
                        <h3 data-i18n="share.title">Share Your Dark Core</h3>
                        <div class="share-buttons">
                            <button class="btn btn-share btn-twitter" id="shareTwitter" data-i18n="share.twitter">Share on X</button>
                            <button class="btn btn-share btn-copy" id="shareCopy" data-i18n="share.copyUrl">Copy Link</button>
                        </div>
                    </div>

                    <button class="btn btn-retake" id="retakeBtn" data-i18n="result.retake">Retake Test</button>
                </div>
            </section>
        </div>
    </main>

    <footer>
