<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <radialGradient id="bg" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#5C0000"/>
      <stop offset="100%" stop-color="#1a0000"/>
    </radialGradient>
    <radialGradient id="glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#8B0000" stop-opacity="0.6"/>
      <stop offset="100%" stop-color="#8B0000" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="innerGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#B91C1C" stop-opacity="0.4"/>
      <stop offset="100%" stop-color="#B91C1C" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <!-- Background -->
  <rect width="512" height="512" rx="100" fill="url(#bg)"/>
  <!-- Outer glow -->
  <circle cx="256" cy="256" r="200" fill="url(#glow)"/>
  <!-- Inner glow -->
  <circle cx="256" cy="256" r="120" fill="url(#innerGlow)"/>
  <!-- Dark crystal / eye shape -->
  <path d="M256 100 L346 256 L256 412 L166 256 Z" fill="#8B0000" opacity="0.9"/>
  <path d="M256 130 L330 256 L256 382 L182 256 Z" fill="#B91C1C" opacity="0.35"/>
  <!-- Inner eye circle -->
  <circle cx="256" cy="256" r="45" fill="#1a0000" opacity="0.9"/>
  <circle cx="256" cy="256" r="24" fill="#8B0000" opacity="0.8"/>
  <circle cx="246" cy="246" r="8" fill="#fff" opacity="0.4"/>
  <!-- Ambient particles large -->
  <circle cx="100" cy="100" r="5" fill="#B91C1C" opacity="0.5"/>
  <circle cx="420" cy="110" r="4" fill="#B91C1C" opacity="0.4"/>
  <circle cx="110" cy="410" r="4" fill="#B91C1C" opacity="0.3"/>
  <circle cx="400" cy="400" r="5" fill="#B91C1C" opacity="0.4"/>
  <!-- Ambient particles medium -->
  <circle cx="180" cy="70" r="3" fill="#B91C1C" opacity="0.3"/>
  <circle cx="350" cy="60" r="3" fill="#B91C1C" opacity="0.25"/>
  <circle cx="450" cy="250" r="3" fill="#B91C1C" opacity="0.35"/>
  <circle cx="60" cy="280" r="3" fill="#B91C1C" opacity="0.3"/>
  <circle cx="330" cy="450" r="3" fill="#B91C1C" opacity="0.25"/>
  <circle cx="170" cy="440" r="3" fill="#B91C1C" opacity="0.35"/>
  <!-- Small particles -->
  <circle cx="140" cy="160" r="2" fill="#B91C1C" opacity="0.2"/>
  <circle cx="380" cy="170" r="2" fill="#B91C1C" opacity="0.2"/>
  <circle cx="70" cy="350" r="2" fill="#B91C1C" opacity="0.25"/>
  <circle cx="440" cy="340" r="2" fill="#B91C1C" opacity="0.2"/>
</svg>
